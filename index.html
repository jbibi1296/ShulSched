<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midrash Elyon Shul Publications - Live Dynamic Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=David+Libre:wght@400;500;700&display=swap');

        /* Screen Presentation Styles */
        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 40px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Strict 8.5" x 11" Printable Page Container */
        .print-page {
            background-color: #ffffff;
            width: 8.5in;
            height: 11in;
            box-sizing: border-box;
            position: relative;
            color: #0b2347; /* Midrash Elyon Navy */
            overflow: hidden;
            page-break-after: always;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        /* ==========================================================================
           TEMPLATE 1: WEEKLY SCHEDULE FLYER
           ========================================================================== */
        .schedule-layout {
            padding: 0.35in 0.65in;
            font-family: 'Cinzel', serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
            position: relative;
            
            /* Premium Border Framing */
            border: 14px solid #0b2347;
            outline: 3px double #c5a059;
            outline-offset: -10px;
        }

        .schedule-content-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex: 1;
        }

        /* Lock BS"D strictly to the top right inside of the borders */
        .bsd {
            font-family: 'David Libre', serif;
            font-size: 1.15rem;
            position: absolute;
            top: 15px;
            right: 20px;
            margin: 0;
            font-weight: 700;
            color: #c5a059;
        }

        /* Split Header Grid System */
        .header-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1.2fr;
            align-items: center; 
            margin-top: 15px;
            border-bottom: 2px solid #0b2347;
            padding-bottom: 12px;
            gap: 10px;
        }

        .grid-left {
            font-family: 'David Libre', serif;
            font-size: 1.35rem; 
            font-weight: 700;
            text-align: left;
            line-height: 1.3;
            color: #0b2347;
            white-space: nowrap;
        }

        .grid-center { text-align: center; }

        .grid-right {
            font-size: 0.95rem; 
            font-weight: 700;
            text-align: right;
            letter-spacing: 0.3px;
            line-height: 1.4;
            color: #0b2347;
            white-space: nowrap;
        }

        .entrance-note {
            font-size: 0.75rem;
            font-weight: 500;
            color: #64748b;
            display: block;
            margin-top: 2px;
        }

        .logo-img {
            width: 250px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0px 2px 4px rgba(11, 35, 71, 0.15));
        }

        .logo-deal {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin-top: 4px;
            color: #c5a059;
        }

        .section-title {
            font-size: clamp(1.1rem, 2.5vw, 1.25rem);
            font-weight: 700;
            letter-spacing: 2px;
            color: #0b2347;
            margin: 10px 0 4px 0;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .section-title::before, .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to var(--dir, right), #c5a059, transparent);
            margin: 0 15px;
        }
        .section-title::after { --dir: left; }

        .time-box { padding: 0 10px; margin-bottom: 2px; }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: clamp(1.05rem, 2.2vw, 1.15rem); 
            font-weight: 600;
            margin: 3px 0;
            letter-spacing: 0.5px;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 2px;
            white-space: nowrap;
        }
        
        .time-row.highlight {
            color: #d93838;
            font-weight: 700;
            border-bottom: 1px dashed rgba(217, 56, 56, 0.3);
        }

        .row-full {
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-weight: 700;
            color: #334155;
            margin-top: 3px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Boxed Dedications Container - Flex distribution handles dynamic sizing securely */
        .dedications-box {
            background: linear-gradient(135deg, #fdfbf7 0%, #fcf9f2 100%);
            border: 2px solid #eadeca;
            border-top: 4px solid #c5a059;
            border-radius: 6px;
            padding: 12px 18px;
            margin-top: auto; 
            box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dedication-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1rem, 2vw, 1.1rem);
            font-weight: 700;
            letter-spacing: 3px;
            color: #c5a059;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            white-space: nowrap;
        }
        .dedication-title::before, .dedication-title::after { content: '◆'; font-size: 8px; }

        .dedications-columns {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
        }

        .dedications-column { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .dedications-column:not(:last-child) { border-right: 1px dashed #eadeca; padding-right: 10px; }

        .dedication-entry { padding-bottom: 4px; }
        .dedication-type { font-size: clamp(0.8rem, 1.6vw, 0.9rem); font-weight: 700; margin-bottom: 2px; letter-spacing: 1.5px; color: #c5a059; text-transform: uppercase; white-space: normal; }
        .dedication-text { font-size: clamp(0.85rem, 1.8vw, 1rem); line-height: 1.4; font-weight: 600; color: #0b2347; }
        .dedication-text strong { font-weight: 700; font-size: inherit; }

        /* ==========================================================================
           TEMPLATE 2: TABLE DEDICATION FLYER
           ========================================================================== */
        .table-layout {
            padding: 0.6in 0.6in;
            font-family: 'Cinzel', serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
            background-color: #faf8f5;
            position: relative;
            
            border: 24px solid #0b2347;
            outline: 6px double #c5a059;
            outline-offset: -18px;
        }

        .table-layout .bsd { position: absolute; top: 20px; right: 25px; font-size: 1.3rem; color: #c5a059; }
        .table-layout .logo-img { width: 380px; margin-bottom: 5px; margin-top: 15px; }
        .table-parsha { font-family: 'David Libre', serif; font-size: 4rem; font-weight: 700; margin: 5px 0 15px 0; color: #0b2347; text-shadow: 2px 2px 0px rgba(197, 160, 89, 0.3); }
        .table-purpose { font-family: 'Cinzel Decorative', serif; font-size: 2.8rem; font-weight: 700; letter-spacing: 4px; margin-bottom: 2px; line-height: 1.2; color: #c5a059; }
        .table-is-dedicated { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 6px; color: #64748b; }
        .diamond-separator { font-size: 1.4rem; color: #c5a059; margin: 5px 0 20px 0; letter-spacing: 12px; }

        .table-dedications-container { display: flex; flex-direction: column; justify-content: center; gap: 15px; width: 100%; }
        .table-dedication-block { font-size: 1.6rem; line-height: 1.6; font-weight: 500; color: #334155; width: 100%; }
        .table-dedication-block span { display: block; }
        .table-dedication-block .bold-core-dedication { font-size: 2.2rem; font-weight: 700; color: #0b2347; letter-spacing: 0.5px; line-height: 1.3; margin: 10px 0; }
        .table-dedication-block .by-line { font-family: 'Cinzel Decorative', serif; font-weight: 700; margin-top: 15px; font-size: 1.8rem; color: #c5a059; letter-spacing: 1px; }
        .table-text-divider { font-family: 'Cinzel Decorative', serif; font-weight: 700; font-size: 1.4rem; color: #c5a059; margin: 5px 0; letter-spacing: 2px; }

        .loading-text { font-family: 'Cinzel', serif; font-size: 1.8rem; color: #0b2347; text-align: center; width: 100%; margin-top: 150px; }

        /* ==========================================================================
           PRINT AND EXACT ASPECT-RATIO MOBILE SCALING
           ========================================================================== */
        @media print {
            body { background-color: #ffffff; padding: 0; margin: 0; }
            .print-page { border: none; box-shadow: none; width: 8.5in; height: 11in; margin: 0; transform: none; }
        }

        @media screen and (max-width: 836px) { 
            body { padding: 10px 0; gap: 0; overflow-x: hidden; }
            .print-page {
                transform: scale(calc((100vw - 20px) / 816));
                transform-origin: top center;
                margin-bottom: calc(1056px * (((100vw - 20px) / 816) - 1) + 20px); 
            }
        }
    </style>
</head>
<body>

    <div id="loading-state" class="loading-text">SYNCING LIVE BULLETINS WITH MIDRASH ELYON MASTER SCHEDULE SHEET...</div>
    <div id="wrapper" style="display: none; flex-wrap: wrap; justify-content: center; gap: 40px; width: 100%;"></div>

    <script>
        // Use the newly provided Google Sheet ID directly
        const SHEET_ID = '16S4nkP8kcsongakIqn0DBHqUIXwuI7khWlQEDd3xdlU';
        const TAB_NAME = 'WebsiteInfo';
        const ENDPOINT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${TAB_NAME}`;

        fetch(ENDPOINT_URL)
            .then(response => response.text())
            .then(rawText => {
                // Strip the Google API wrapper cleanly
                const structuredJSON = JSON.parse(rawText.substr(47).slice(0, -2));
                const spreadsheetRows = structuredJSON.table.rows;
                
                // Read row data dynamically
                const englishDateHeader = spreadsheetRows[0]?.c[0]?.f || spreadsheetRows[0]?.c[0]?.v || 'Date Loading Error';
                const hebrewParshaValue = spreadsheetRows[2]?.c[1]?.v || 'Parsha Loading Error';
                const candleLightingTime = spreadsheetRows[2]?.c[3]?.f || spreadsheetRows[2]?.c[3]?.v || 'Time Error';
                const rawDedicationsText = spreadsheetRows[0]?.c[1]?.v || '';
                
                processSpreadsheetPayload(englishDateHeader, hebrewParshaValue, candleLightingTime, rawDedicationsText);
            })
            .catch(error => {
                document.getElementById('loading-state').innerText = "SYNC FAILURE: Please confirm the Google Sheet Share permission is set to 'Anyone with the link can view'.";
                console.error(error);
            });

        function processSpreadsheetPayload(dateEnglish, parshaHebrew, candleLighting, rawDedicationsText) {
            const textLines = rawDedicationsText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            // Dynamic category tracking (detects any of these variations in the text)
            const allowedCategories = ["SHABBAT KIDDUSH", "SUNDAY BREAKFAST", "SEUDAT SHELISHEET", "GAN SHABBAT"];
            
            let currentCategory = '';
            const groupedDedications = {};

            for (let i = 0; i < textLines.length; i++) {
                const normalizedLine = textLines[i].toUpperCase();
                
                // Check if this line is a structural category header
                let foundCategory = allowedCategories.find(c => normalizedLine.includes(c));
                if (foundCategory) {
                    currentCategory = foundCategory; // Lock in the exact matched string
                    if (!groupedDedications[currentCategory]) {
                        groupedDedications[currentCategory] = [];
                    }
                    continue;
                } 
                
                if (normalizedLine === "~AND~" || normalizedLine === "~AND~") {
                    continue;
                }

                if (normalizedLine.startsWith("IN HONOR OF")) {
                    let honorText = "";
                    let byText = "";
                    
                    // Core scanning sub-loop grouping multi-line string values safely together
                    while (i + 1 < textLines.length && 
                           !textLines[i + 1].toUpperCase().startsWith("BY:") && 
                           !allowedCategories.some(c => textLines[i + 1].toUpperCase().includes(c)) && 
                           textLines[i + 1].toUpperCase() !== "~AND~") {
                        i++;
                        honorText += (honorText ? " " : "") + textLines[i];
                    }
                    
                    if (i + 1 < textLines.length && textLines[i + 1].toUpperCase().startsWith("BY:")) {
                        i++;
                        byText = textLines[i].replace(/^BY:\s*/i, '');
                    }

                    if (currentCategory && groupedDedications[currentCategory]) {
                        groupedDedications[currentCategory].push({ honor: honorText, by: byText });
                    }
                }
            }

            // Generate Flyer 1 Columns (Distributes unique event types into dynamic columns)
            let flyer1ColumnsHTML = '';
            for (const [type, items] of Object.entries(groupedDedications)) {
                flyer1ColumnsHTML += `<div class="dedications-column">`;
                items.forEach(item => {
                    // Proper title-casing for the display type
                    let displayType = type.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
                    
                    flyer1ColumnsHTML += `
                        <div class="dedication-entry">
                            <div class="dedication-type">${displayType}</div>
                            <div class="dedication-text">
                                IN HONOR OF<br>
                                <strong>${item.honor}</strong><br>
                                <span style="font-weight: 700; color: #c5a059;">BY: ${item.by}</span>
                            </div>
                        </div>`;
                });
                flyer1ColumnsHTML += `</div>`;
            }

            // Fallback string manipulation to extract the Hebrew Date cleanly if needed
            // Currently using your standard format
            const formattingHebrewDate = "ה' תמוז תשפ\"ו"; 

            // Compile Page 1: Dynamic Master Schedule Flyer
            let finalHTML = `
            <div class="print-page">
                <div class="schedule-layout">
                    <div class="bsd">בס"ד</div>
                    <div class="schedule-content-container">
                        <div class="header-grid">
                            <div class="grid-left">פרשת ${parshaHebrew}<br>${formattingHebrewDate}</div>
                            <div class="grid-center">
                                <img class="logo-img" src="https://i.postimg.cc/63d0xqh4/Midrash-Elyon-Newsletter-(7).png" alt="Midrash Elyon Logo">
                                <div class="logo-deal">DEAL</div>
                            </div>
                            <div class="grid-right">SHABBAT SCHEDULE<br>${dateEnglish}<br>82 NORWOOD AVE<br><span class="entrance-note">(POPLAR ENTRANCE)</span></div>
                        </div>
                        <div class="time-box">
                            <div class="section-title">Shabbat Schedule</div>
                            <div class="time-row highlight"><span>CANDLE LIGHTING</span><span>${candleLighting}</span></div>
                            <div class="time-row"><span>KORBANOT</span><span>7:00AM</span></div>
                            <div class="time-row"><span>HASHEM MELECH</span><span>7:15AM</span></div>
                            <div class="row-full">FOLLOWED BY AN EXQUISITE KIDDUSH AND CLASS</div>
                        </div>
                        <div class="time-box">
                            <div class="section-title">Sunday Schedule</div>
                            <div class="time-row"><span>SHACHARIT</span><span>8:00AM</span></div>
                            <div class="row-full">FOLLOWED BY BREAKFAST & CLASS</div>
                        </div>
                        <div class="time-box">
                            <div class="section-title">Weekday Schedule</div>
                            <div class="time-row"><span>GEMARA CLASSES</span><span>6:15AM</span></div>
                            <div class="time-row"><span>SHACHARIT</span><span>7:15AM</span></div>
                            <div class="row-full">FOLLOWED BY BREAKFAST & LEARNING</div>
                        </div>
                        <div class="time-box">
                            <div class="section-title">Learning Program</div>
                            <div class="time-row" style="justify-content: center; font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; border: none;">MONDAY - FRIDAY MORNING</div>
                            <div class="row-full" style="font-weight: 600; margin-bottom: 2px; color: #0b2347;">MULTIPLE LEARNING GROUPS AT 6:30AM & 8:00AM</div>
                            <div class="row-full" style="font-size: 0.95rem; color: #4b5563;">TO JOIN A CLASS, PLEASE REACH OUT TO RABBI DAVID HABER</div>
                        </div>
                    </div>
                    <div class="dedications-box" ${Object.keys(groupedDedications).length === 0 ? 'style="display:none;"' : ''}>
                        <div class="dedication-title">Weekly Dedications</div>
                        <div class="dedications-columns">
                            ${flyer1ColumnsHTML}
                        </div>
                    </div>
                </div>
            </div>`;

            // Compile Page 2+: Individual Table Pages generated natively per unique category
            for (const [type, items] of Object.entries(groupedDedications)) {
                let tableBlocksHTML = items.map(item => `
                    <div class="table-dedication-block">
                        <span>IN HONOR OF</span>
                        <div class="bold-core-dedication">${item.honor}</div>
                        <span class="by-line">BY: ${item.by}</span>
                    </div>
                `).join('<div class="table-text-divider">~ AND ~</div>');

                finalHTML += `
                <div class="print-page">
                    <div class="table-layout">
                        <div class="bsd">בס"ד</div>
                        <img class="logo-img" src="https://i.postimg.cc/63d0xqh4/Midrash-Elyon-Newsletter-(7).png" alt="Midrash Elyon Logo">
                        <div class="table-parsha">פרשת ${parshaHebrew}</div>
                        <div class="table-purpose">${type.toUpperCase()}</div>
                        <div class="table-is-dedicated">is dedicated</div>
                        <div class="diamond-separator">◆ <span>◆</span> ◆</div>
                        <div class="table-dedications-container">${tableBlocksHTML}</div>
                    </div>
                </div>`;
            }

            // Append output modules directly into DOM
            document.getElementById('loading-state').style.display = 'none';
            const applicationWrapper = document.getElementById('wrapper');
            applicationWrapper.innerHTML = finalHTML;
            applicationWrapper.style.display = 'flex';
        }
    </script>
</body>
</html>
