        /* Strict Screen Locks */
        html, body {
            width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px 0;
        }

        /* The Wrapper dynamically sizes itself via JavaScript on mobile 
           so the page flow remains perfectly intact without overlapping.
        */
        .flyer-wrapper {
            position: relative;
            width: 816px;
            height: 1056px;
        }

        /* The Flyer itself is rigidly locked to exactly 8.5x11 inches. 
           It will never squish, wrap, or collapse.
        */
        .print-page {
            background-color: #ffffff;
            width: 816px; 
            height: 1056px; 
            box-sizing: border-box;
            position: relative;
            color: #0b2347; 
            overflow: hidden;
            page-break-after: always;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
